services:
  - type: web
    name: analisador-paradoxos
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download pt_core_news_sm
      python -m spacy download en_core_web_sm
    startCommand: gunicorn app:app
    envVars:
      - key: PORT
        value: 10000